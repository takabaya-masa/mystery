<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>???</title>

<style>
html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family: "Yu Gothic", sans-serif;
}

#noise{
    position:fixed;
    inset:0;
    opacity:0.08;
    background-image:
      repeating-radial-gradient(circle at center,#fff 0,#000 1px,#000 2px);
    animation:noise .15s infinite;
}

@keyframes noise{
    0%{transform:translate(0,0);}
    25%{transform:translate(5px,-3px);}
    50%{transform:translate(-4px,2px);}
    75%{transform:translate(3px,5px);}
    100%{transform:translate(0,0);}
}

#message{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    color:#550000;
    font-size:15vw;
    font-weight:bold;
    text-shadow:0 0 10px red;
    opacity:0;
    transition:1.5s;
    user-select:none;
}

.glitch{
    animation:glitch .12s infinite;
}

@keyframes glitch{
    0%{transform:translate(-50%,-50%) translate(2px,-1px);}
    20%{transform:translate(-50%,-50%) translate(-3px,1px);}
    40%{transform:translate(-50%,-50%) translate(2px,2px);}
    60%{transform:translate(-50%,-50%) translate(-2px,-2px);}
    80%{transform:translate(-50%,-50%) translate(3px,1px);}
    100%{transform:translate(-50%,-50%) translate(0,0);}
}

.flash{
    animation:flash .15s;
}

@keyframes flash{
    from{background:white;}
    to{background:black;}
}
</style>
</head>

<body>

<div id="noise"></div>
<div id="message"></div>

<script>

const msg=document.getElementById("message");

// 1秒後に赤文字出現
setTimeout(()=>{
    msg.textContent="引き返せ";
    msg.style.opacity=1;
    msg.style.color="#aa0000";
    msg.classList.add("glitch");

    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }

},1000);


// 5秒後に文字変更
setTimeout(()=>{

    document.body.classList.add("flash");

    msg.textContent="まだ戻れる";

    if(navigator.vibrate){
        navigator.vibrate([100,80,100,80,300]);
    }

},5000);


// 9秒後
setTimeout(()=>{

    msg.textContent="進むなら、覚悟しろ";

    msg.style.color="#ff0000";
    msg.style.fontSize="12vw";

},9000);


// ランダムにチラつく
setInterval(()=>{

    msg.style.opacity=Math.random()*0.5+0.5;

},120);

</script>

</body>
</html>
